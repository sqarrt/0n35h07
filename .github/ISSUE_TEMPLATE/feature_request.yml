name: Feature request
description: Suggest an idea — a mechanic, skin, map, QoL improvement…
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What's the idea?
      description: What would you like, and what problem does it solve or what fun does it add?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered (optional)
      description: Other ways you thought about solving this.
  - type: checkboxes
    id: area
    attributes:
      label: Area
      options:
        - label: Gameplay / combat
        - label: Bots / AI
        - label: Netcode / online
        - label: Skins / FX / art
        - label: Maps / editor
        - label: UI / HUD / i18n
