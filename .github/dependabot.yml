version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Batch low-risk updates into single PRs to cut noise.
      dev-dependencies:
        dependency-type: development
      react-three:
        patterns:
          - "@react-three/*"
          - three
          - "@types/three"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
