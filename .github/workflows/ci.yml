name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Fast, deterministic gate — this is the job to require in branch protection.
  check:
    name: lint · types · unit · build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc -b --noEmit

      - name: Unit tests
        run: npm run test:unit

      - name: Build (app + trailer)
        run: npm run build

  # Browser e2e (WebGL + Rapier). On free runners WebGL is software-rendered (SwiftShader) and slow,
  # so this runs with 1 worker and generous timeouts (see playwright.config.ts, gated by $CI).
  # Kept non-blocking (continue-on-error) so a slow/flaky runner doesn't red the whole CI; once it's
  # proven stable here, drop continue-on-error to make it a required gate.
  e2e:
    name: e2e (headless)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium chromium-headless-shell

      - name: E2E tests (headless)
        run: npm run test:e2e
