name: Deploy to GitHub Pages

# Builds the web game and publishes it to GitHub Pages — ON A RELEASE TAG ONLY (the public site = the
# last released version; master pushes run tests via ci.yml, not a deploy). Manual run via workflow_dispatch.
# One-time setup: repo Settings → Pages → "Build and deployment" → Source: GitHub Actions; and
# Settings → Environments → github-pages → "Deployment branches and tags" must allow the tag (e.g. `*.*.*`).
#
# TURN: add repo secrets VITE_TURN_USERNAME / VITE_TURN_CREDENTIAL to enable relay on symmetric
# NATs. NOTE: a static site has no backend, so these are inlined into the client bundle and ARE
# PUBLICLY VISIBLE in DevTools — the GitHub Secret only keeps them out of git and lets you rotate
# without a commit. Use a quota-capped provider plan (no overdraft) so a leaked credential can at
# worst burn your free GB, and rotate it periodically. Leave the secrets unset for STUN-only.

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # base is './' in vite.config.ts → the build works under the /<repo>/ project subpath as-is.
      - name: Build
        run: npm run build
        env:
          VITE_TURN_USERNAME: ${{ secrets.VITE_TURN_USERNAME }}
          VITE_TURN_CREDENTIAL: ${{ secrets.VITE_TURN_CREDENTIAL }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
