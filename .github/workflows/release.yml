name: Release (desktop)

# Builds the Tauri desktop app (Windows .msi + NSIS .exe) on a version tag, creates a PUBLISHED
# GitHub Release (the annotated tag's message becomes the notes) and attaches the bundles.
# Fully automatic on the tag — no manual step. Replaces the old GitLab Tauri job.
#
# Trigger: push an annotated tag like `0.5.9` (`git tag -a 0.5.9 -m "..."` — the message is the
# release notes). Code-signing is optional (add TAURI_SIGNING_* secrets to enable).

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  desktop:
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need the annotated tag object to read its message for the release notes

      - name: Tag message → release notes
        id: notes
        shell: bash
        run: |
          {
            echo 'body<<__TAG_EOF__'
            git tag -l --format='%(contents)' "${{ github.ref_name }}"
            echo '__TAG_EOF__'
          } >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      # tauri.conf.json holds a literal version; set it to the tag so the .msi/.exe version always
      # matches the release without a manual bump (build-time patch only, not committed).
      - name: Sync installer version to the tag
        shell: bash
        run: |
          node -e "const f='src-tauri/tauri.conf.json',fs=require('fs');const c=JSON.parse(fs.readFileSync(f));c.version='${{ github.ref_name }}';fs.writeFileSync(f,JSON.stringify(c,null,2)+'\n')"

      # tauri-action runs the frontend build via beforeBuildCommand (`npm run build:desktop`),
      # then `tauri build`, and uploads the bundles to the GitHub Release for this tag.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "0N35H07 ${{ github.ref_name }}"
          releaseBody: ${{ steps.notes.outputs.body }}   # the annotated tag's message
          releaseDraft: false   # publish immediately — fully automatic on the tag, no manual step
          prerelease: false
