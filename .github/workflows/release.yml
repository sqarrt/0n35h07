name: Release (notes)

# On a version tag: publish a GitHub Release whose notes are the annotated tag's message. No build —
# the desktop app is built locally for Steam (npm run build:steam), and the web version ships via
# deploy-pages. This used to also build the Tauri .msi/.exe; that desktop build was dropped.
#
# Trigger: push an annotated tag like `0.5.11` (`git tag -a 0.5.11 -F notes` — the message is the notes).

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need the annotated tag object to read its message for the release notes

      - name: Tag message → release notes
        id: notes
        shell: bash
        run: |
          {
            echo 'body<<__TAG_EOF__'
            git tag -l --format='%(contents)' "${{ github.ref_name }}"
            echo '__TAG_EOF__'
          } >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release (notes only)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "0N35H07 ${{ github.ref_name }}"
          body: ${{ steps.notes.outputs.body }}
          draft: false
          prerelease: false
