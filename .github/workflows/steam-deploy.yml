name: Steam deploy (beta)

# On a release tag: build the Windows app and upload it to SteamPipe on the BETA branch.
# Promotion beta -> default is a manual one-click in the Steamworks partner portal.
#
# The steamworks crate bundles its own Steam SDK — do NOT set STEAM_SDK_LOCATION; the runtime
# steam_api64.dll is emitted by the build (steamworks-sys OUT) and shipped next to the exe.
# Secrets required: STEAM_USERNAME (a dedicated build account) and STEAM_CONFIG_VDF (its
# Steam-Guard-authenticated config.vdf, base64 — see the game-ci/steam-deploy README).
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  steam:
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      # tauri.conf.json holds a literal version; set it to the tag so the build matches the release.
      - name: Sync version to the tag
        shell: bash
        run: |
          node -e "const f='src-tauri/tauri.conf.json',fs=require('fs');const c=JSON.parse(fs.readFileSync(f));c.version='${{ github.ref_name }}';fs.writeFileSync(f,JSON.stringify(c,null,2)+'\n')"

      # Build the frontend in Tauri mode (dist/), then the Windows binary. tauri-build embeds dist/
      # into the exe, so no Tauri CLI / bundling is needed for the Steam depot.
      - name: Build frontend (tauri mode)
        run: npm run build:desktop

      - name: Build the Windows binary
        working-directory: src-tauri
        run: cargo build --release

      # Depot content = the exe + the Steam runtime DLL (emitted into steamworks-sys' OUT dir).
      - name: Assemble depot
        shell: bash
        run: |
          mkdir -p steam-build
          cp src-tauri/target/release/app.exe steam-build/0N35H07.exe
          dll=$(ls src-tauri/target/release/build/steamworks-sys-*/out/steam_api64.dll | head -1)
          cp "$dll" steam-build/
          ls -la steam-build

      - name: Upload to SteamPipe (beta)
        uses: game-ci/steam-deploy@v3
        with:
          username: ${{ secrets.STEAM_USERNAME }}
          configVdf: ${{ secrets.STEAM_CONFIG_VDF }}
          appId: 4881310
          buildDescription: ${{ github.ref_name }}
          rootPath: steam-build
          depot1Path: .
          releaseBranch: beta
