name: Steam deploy (beta)

# On a release tag: build the Windows app and upload it to SteamPipe on the BETA branch.
# Promotion beta -> default is a manual one-click in the Steamworks partner portal.
#
# The steamworks crate bundles its own Steam SDK — do NOT set STEAM_SDK_LOCATION; build.rs copies
# the runtime steam_api64.dll next to the exe, so the depot is just the exe + that DLL.
# Secrets required: STEAM_USERNAME (a dedicated build account) and STEAM_CONFIG_VDF (its
# Steam-Guard-authenticated config.vdf, base64 — see the game-ci/steam-deploy README).
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*"
  pull_request:
    types: [labeled]   # manual: add the "steam-deploy" label to a PR to push that build to beta
  workflow_dispatch:

permissions:
  contents: read

jobs:
  steam:
    # On a PR, run ONLY when the "steam-deploy" label is added (manual gate). Tags and manual
    # dispatch always run. (Same-repo PRs only — fork PRs have no access to the Steam secrets.)
    if: github.event_name != 'pull_request' || github.event.label.name == 'steam-deploy'
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      # tauri.conf.json holds a literal version; set it to the tag (a real release) or, on a PR/dispatch
      # where the ref isn't a version, to the package.json version — so the build always has a valid version.
      - name: Sync installer version
        shell: bash
        run: |
          ver="${{ github.ref_name }}"
          case "$ver" in
            [0-9]*.[0-9]*.[0-9]*) : ;;
            *) ver="$(node -p "require('./package.json').version")" ;;
          esac
          node -e "const f='src-tauri/tauri.conf.json',fs=require('fs');const c=JSON.parse(fs.readFileSync(f));c.version=process.argv[1];fs.writeFileSync(f,JSON.stringify(c,null,2)+'\n')" "$ver"
          echo "installer version: $ver"

      # Build the frontend in Tauri mode (dist/), then the Windows binary. tauri-build embeds dist/
      # into the exe, so no Tauri CLI / bundling is needed for the Steam depot.
      - name: Build frontend (tauri mode)
        run: npm run build:desktop

      - name: Build the Windows binary
        working-directory: src-tauri
        run: cargo build --release

      # Depot content = the exe + the Steam runtime DLL (build.rs copies it next to the exe).
      - name: Assemble depot
        shell: bash
        run: |
          mkdir -p steam-build
          cp src-tauri/target/release/app.exe steam-build/0N35H07.exe
          cp src-tauri/target/release/steam_api64.dll steam-build/
          ls -la steam-build

      - name: Upload to SteamPipe (beta)
        uses: game-ci/steam-deploy@v3
        with:
          username: ${{ secrets.STEAM_USERNAME }}
          configVdf: ${{ secrets.STEAM_CONFIG_VDF }}
          appId: 4881310
          buildDescription: ${{ github.ref_name }}
          rootPath: steam-build
          depot1Path: .
          releaseBranch: beta
