# CI/CD: сборка фронтенда по git-тегу + авто-деплой на nginx через explicit FTPS.
# Таuri-бинарь (Windows .msi) собирается параллельно и публикуется в Package Registry.
# GitLab Release создаётся автоматически после успешной сборки бинаря.
#
# Пайплайн стартует ТОЛЬКО на тег. Все джобы — автоматические.
# FTP-доступ задаётся переменными CI/CD (Settings -> CI/CD -> Variables), НЕ хардкодится:
#   FTP_HOST, FTP_PORT, FTP_USER, FTP_PASSWORD (masked), FTP_REMOTE_DIR

stages:
  - build
  - deploy
  - tauri
  - release

# Весь пайплайн (все джобы) — только при пуше тега.
workflow:
  rules:
    - if: $CI_COMMIT_TAG

# --- фронтенд ---

build:
  stage: build
  image: node:22
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
  script:
    - npm ci
    - npm run build   # tsc -b && vite build -> dist/
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

deploy:
  stage: deploy
  image: alpine:3
  needs:
    - build           # тянет артефакт dist/ из build (и держит порядок build -> deploy)
  environment:
    name: production
  before_script:
    - apk add --no-cache lftp
  script:
    - |
      lftp -e "
        set ftp:ssl-force true;
        set ftp:ssl-protect-data true;
        set ssl:verify-certificate no;
        set net:max-retries 2;
        open -u '$FTP_USER','$FTP_PASSWORD' 'ftp://$FTP_HOST:$FTP_PORT';
        mirror -R --delete --verbose dist/ '$FTP_REMOTE_DIR';
        bye"

# --- Tauri Windows-бинарь (параллельно с build/deploy) ---

tauri-windows:
  stage: tauri
  timeout: 2h            # холодная компиляция Rust+tauri на Windows-раннере долгая; дефолтного лимита мало
  tags:
    - saas-windows-medium-amd64
  variables:
    CARGO_HOME: .cargo   # кладём cargo-кэш в проектную директорию → GitLab его кэширует
  cache:
    # СТАБИЛЬНЫЙ ключ (НЕ по тегу): иначе каждый релиз-тег = холодный кэш = полная пересборка = таймаут.
    key: cargo-windows
    when: always         # сохранять кэш ДАЖЕ при провале/таймауте → частичная компиляция переживает прогон,
    paths:               # следующий запуск продолжает с неё (иначе вечный холодный билд по кругу)
      - .cargo/registry/
      - .cargo/git/
      - .cargo/bin/        # rustup + cargo-tauri: кэшируем бинарь, иначе ставятся/компилятся каждый прогон
      - src-tauri/target/
  before_script:
    - |
      # Node 22: раннер несёт node 21 (нечётная, не-LTS) — её не поддерживают vite 8/rolldown/vitest
      # (нужно ^20.19 || >=22.12) → EBADENGINE и падение vite build. Ставим портативный node 22 и кладём в PATH.
      $nodeVer = "v22.12.0"
      $nodeDir = Join-Path $env:CI_PROJECT_DIR "node-$nodeVer-win-x64"
      if (-not (Test-Path (Join-Path $nodeDir "node.exe"))) {
        Write-Host "Installing Node $nodeVer..."
        Invoke-WebRequest -Uri "https://nodejs.org/dist/$nodeVer/node-$nodeVer-win-x64.zip" -OutFile node.zip
        Expand-Archive node.zip -DestinationPath $env:CI_PROJECT_DIR -Force
        Remove-Item node.zip -ErrorAction SilentlyContinue
      }
      $env:PATH = "$nodeDir;$env:PATH"
      # CARGO_HOME=.cargo → cargo ставится в ПРОЕКТНЫЙ .cargo\bin. Добавляем его в PATH БЕЗУСЛОВНО и до
      # проверки: иначе cargo не находится ни при детекте, ни в `cargo tauri build` (старый баг — PATH вёл
      # в $USERPROFILE\.cargo\bin и только внутри if, из-за чего джоба падала с 'cargo' is not recognized).
      $cargoBin = Join-Path $env:CI_PROJECT_DIR ".cargo\bin"
      $env:PATH = "$cargoBin;$env:PATH"
      if (-not (Get-Command cargo -ErrorAction SilentlyContinue)) {
        Write-Host "Installing Rust..."
        Invoke-WebRequest -Uri "https://static.rust-lang.org/rustup/dist/x86_64-pc-windows-msvc/rustup-init.exe" -OutFile rustup-init.exe
        .\rustup-init.exe -y --default-toolchain stable-x86_64-pc-windows-msvc --no-modify-path
        Remove-Item rustup-init.exe -ErrorAction SilentlyContinue   # exe может быть залочен — не валим джобу
      }
      # Tauri CLI: раннер несёт только rustc/cargo, но не cargo-tauri → `cargo tauri build` падал с
      # 'no such command: tauri'. Ставим cargo-tauri в .cargo\bin (кэшируется → ставится один раз).
      if (-not (Test-Path (Join-Path $cargoBin "cargo-tauri.exe"))) {
        Write-Host "Installing tauri-cli..."
        cargo install tauri-cli --version "^2.0" --locked
      }
      node --version
      cargo --version
      cargo tauri --version
  script:
    - npm ci
    - |
      # Дублируем PATH к cargo и здесь — на случай, если окружение before_script не дожило до script-шага.
      $env:PATH = "$(Join-Path $env:CI_PROJECT_DIR '.cargo\bin');$env:PATH"
      npm run tauri:build
    - |
      $msi = Get-ChildItem "src-tauri\target\release\bundle\msi\*.msi" | Select-Object -First 1
      if (-not $msi) { Write-Error "MSI not found"; exit 1 }
      $uploadName = "0N35H07-$env:CI_COMMIT_TAG-windows-x64.msi"
      $uploadUrl  = "$env:CI_API_V4_URL/projects/$env:CI_PROJECT_ID/packages/generic/desktop/$env:CI_COMMIT_TAG/$uploadName"
      Write-Host "Uploading $($msi.Name) -> $uploadUrl"
      Invoke-RestMethod -Uri $uploadUrl -Method Put -ContentType "application/octet-stream" `
        -Headers @{ "JOB-TOKEN" = $env:CI_JOB_TOKEN } -InFile $msi.FullName
      Write-Host "Upload complete."
  needs: []   # не ждёт build — запускается параллельно

# --- GitLab Release со ссылкой на .msi ---

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - tauri-windows
  script:
    - echo "Publishing release $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "0N35H07 $CI_COMMIT_TAG"
    # Описание релиза = сообщение аннотированного тега, на котором гоняется пайплайн.
    # CI_COMMIT_TAG_MESSAGE — предопределённая переменная (доступна в тег-пайплайнах).
    # Тег должен быть аннотированным (git tag -a ... -m "..."): у lightweight-тега сообщение пустое.
    description: $CI_COMMIT_TAG_MESSAGE
    assets:
      links:
        - name: "Windows installer (.msi)"
          url: "$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/desktop/$CI_COMMIT_TAG/0N35H07-$CI_COMMIT_TAG-windows-x64.msi"
          link_type: package
