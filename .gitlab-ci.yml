# CI/CD: сборка фронтенда по git-тегу + ручной деплой на nginx через explicit FTPS.
# Пайплайн стартует ТОЛЬКО на тег. build — автоматический, deploy — по кнопке (manual).
# FTP-доступ задаётся переменными CI/CD (Settings -> CI/CD -> Variables), НЕ хардкодится:
#   FTP_HOST, FTP_PORT, FTP_USER, FTP_PASSWORD (masked), FTP_REMOTE_DIR

stages:
  - build
  - deploy

# Весь пайплайн (оба джоба) — только при пуше тега.
workflow:
  rules:
    - if: $CI_COMMIT_TAG

build:
  stage: build
  image: node:22
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
  script:
    - npm ci
    - npm run build   # tsc -b && vite build -> dist/
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

deploy:
  stage: deploy
  image: alpine:3
  needs:
    - build           # тянет артефакт dist/ из build
  when: manual        # кнопка ▶ в GitLab, авто-деплоя нет
  environment:
    name: production
  before_script:
    - apk add --no-cache lftp
  script:
    - |
      lftp -e "
        set ftp:ssl-force true;
        set ftp:ssl-protect-data true;
        set ssl:verify-certificate no;
        set net:max-retries 2;
        open -u \"$FTP_USER\",\"$FTP_PASSWORD\" -p \"$FTP_PORT\" \"$FTP_HOST\";
        mirror -R --delete --verbose dist/ \"$FTP_REMOTE_DIR\";
        bye"
