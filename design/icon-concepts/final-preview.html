<!doctype html>
<html lang="ru"><head><meta charset="utf-8"><title>OneShot — финал иконки</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#06080c;color:#cfe6ff;font-family:'Share Tech Mono',monospace;padding:48px;min-height:100vh}
  h1{font-size:20px;letter-spacing:.32em;color:#4af;text-shadow:0 0 18px rgba(68,170,255,.5);text-align:center}
  .sub{text-align:center;color:#5a6b80;letter-spacing:.18em;font-size:12px;margin-top:10px}
  .panels{display:flex;gap:28px;margin-top:44px;flex-wrap:wrap;justify-content:center}
  .panel{padding:30px;border:1px solid #16202e}
  .panel.dark{background:#070a0f}
  .panel.tab{background:#d9dde3}
  .panel.mid{background:#1b1f26}
  .label{font-size:11px;letter-spacing:.16em;color:#5a6b80;margin-bottom:22px;text-align:center}
  .panel.tab .label{color:#5a6270}
  .sizes{display:flex;align-items:flex-end;gap:26px}
  figure{display:flex;flex-direction:column;align-items:center;gap:8px}
  figcaption{font-size:10px;letter-spacing:.1em;color:#5a6b80}
  .panel.tab figcaption{color:#6b7280}
  img{display:block;image-rendering:auto}
  .browser{margin-top:44px;max-width:560px;margin-inline:auto;border:1px solid #16202e;background:#0a0e15}
  .btab{display:flex;align-items:center;gap:8px;padding:9px 14px;background:#11151c;border-bottom:1px solid #16202e;font-size:12px;color:#9fb4cc}
  .btab img{width:16px;height:16px}
</style></head>
<body>
  <h1>O N E S H O T</h1>
  <div class="sub">ФИНАЛ · 3C — планета навылет</div>

  <div class="panels">
    <div class="panel dark">
      <div class="label">ТЁМНЫЙ ФОН · APP ICON</div>
      <div class="sizes">
        <figure><img src="final.svg" width="160" height="160"><figcaption>160</figcaption></figure>
        <figure><img src="final.svg" width="64" height="64"><figcaption>64</figcaption></figure>
        <figure><img src="final.svg" width="32" height="32"><figcaption>32</figcaption></figure>
        <figure><img src="final.svg" width="16" height="16"><figcaption>16</figcaption></figure>
      </div>
    </div>
    <div class="panel tab">
      <div class="label">СВЕТЛАЯ ВКЛАДКА · FAVICON</div>
      <div class="sizes">
        <figure><img src="final.svg" width="96" height="96"><figcaption>96</figcaption></figure>
        <figure><img src="final.svg" width="32" height="32"><figcaption>32</figcaption></figure>
        <figure><img src="final.svg" width="16" height="16"><figcaption>16</figcaption></figure>
      </div>
    </div>
  </div>

  <div class="browser">
    <div class="btab"><img src="final.svg" alt=""><span>oneshot</span></div>
    <div style="height:60px;background:#06080c"></div>
  </div>
</body></html>
