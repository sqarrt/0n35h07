<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>OneShot — иконка, раунд 2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root{ --accent:#4af; --opp:#fa4; --text:#cfe6ff; --muted:#5a6b80; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:#06080c; color:var(--text); font-family:'Share Tech Mono',monospace;
    padding:46px 32px 80px; min-height:100vh;
    background-image:radial-gradient(1200px 600px at 50% -10%, rgba(68,170,255,.06), transparent); }
  h1{ font-size:22px; letter-spacing:.32em; font-weight:400; color:var(--accent);
      text-shadow:0 0 18px rgba(68,170,255,.5); text-align:center; }
  .sub{ text-align:center; color:var(--muted); letter-spacing:.18em; font-size:12px; margin-top:10px; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(360px,1fr)); gap:28px; margin-top:46px; max-width:1180px; margin-inline:auto; }
  .card{ border:1px solid #16202e; background:linear-gradient(180deg,#0a0e15,#070a0f); padding:26px; display:flex; flex-direction:column; gap:22px; }
  .card-head{ display:flex; align-items:baseline; gap:12px; }
  .num{ color:var(--accent); font-size:13px; letter-spacing:.2em; }
  .name{ font-size:15px; letter-spacing:.2em; }
  .desc{ color:var(--muted); font-size:12px; line-height:1.6; letter-spacing:.04em; }
  .row{ display:flex; align-items:center; gap:24px; flex-wrap:wrap; }
  .hero{ width:150px; height:150px; }
  .scales{ display:flex; align-items:center; gap:18px; }
  .scales figure{ display:flex; flex-direction:column; align-items:center; gap:7px; }
  .scales figcaption{ color:var(--muted); font-size:10px; letter-spacing:.1em; }
  svg.ic{ display:block; }
</style>
</head>
<body>
  <h1>O N E S H O T</h1>
  <div class="sub">РАУНД 2 · развитие 01 (прицел) и 03 (планета)</div>

  <svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="sphere" cx="38%" cy="32%" r="74%">
      <stop offset="0%" stop-color="#e3f5ff"/>
      <stop offset="30%" stop-color="#6cc6ff"/>
      <stop offset="72%" stop-color="#2a8fe0"/>
      <stop offset="100%" stop-color="#0a3f72"/>
    </radialGradient>
    <radialGradient id="flash" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff"/><stop offset="32%" stop-color="#d8f1ff"/>
      <stop offset="100%" stop-color="#4ab6ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="flashWarm" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff"/><stop offset="40%" stop-color="#ffe2b8"/>
      <stop offset="100%" stop-color="#ffaa44" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="beamCyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4ab6ff" stop-opacity="0"/><stop offset="100%" stop-color="#bfeaff"/>
    </linearGradient>
    <linearGradient id="beamCyanR" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#4ab6ff" stop-opacity="0"/><stop offset="100%" stop-color="#bfeaff"/>
    </linearGradient>
    <linearGradient id="beamWarm" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffaa44" stop-opacity="0"/><stop offset="100%" stop-color="#ffd49a"/>
    </linearGradient>

    <!-- 1A — снайперский прицел: кольцо + перекрестие -->
    <symbol id="a" viewBox="0 0 256 256">
      <rect width="256" height="256" rx="52" fill="#070b11"/>
      <rect x="5" y="5" width="246" height="246" rx="48" fill="none" stroke="#13283b" stroke-width="2"/>
      <g stroke="#4ab6ff" fill="none" filter="url(#glow)">
        <circle cx="128" cy="128" r="76" stroke-width="6"
                stroke-dasharray="98 22" stroke-dashoffset="49"/>
        <g stroke-width="7" stroke-linecap="round">
          <path d="M128 24 V64"/><path d="M128 192 V232"/>
          <path d="M24 128 H64"/><path d="M192 128 H232"/>
        </g>
        <g stroke-width="5" stroke-linecap="round" opacity=".95">
          <path d="M128 86 V112"/><path d="M128 144 V170"/>
          <path d="M86 128 H112"/><path d="M144 128 H170"/>
        </g>
      </g>
      <circle cx="128" cy="128" r="30" fill="url(#flash)"/>
      <circle cx="128" cy="128" r="8.5" fill="#fff" filter="url(#glow)"/>
    </symbol>

    <!-- 1B — прицел + луч навылет, оранжевая вспышка попадания -->
    <symbol id="b" viewBox="0 0 256 256">
      <rect width="256" height="256" rx="52" fill="#070b11"/>
      <rect x="5" y="5" width="246" height="246" rx="48" fill="none" stroke="#13283b" stroke-width="2"/>
      <g stroke="#4ab6ff" fill="none" filter="url(#glow)">
        <circle cx="120" cy="128" r="70" stroke-width="6" stroke-dasharray="74 36" stroke-dashoffset="18"/>
        <g stroke-width="6" stroke-linecap="round">
          <path d="M120 38 V60"/><path d="M120 196 V218"/>
        </g>
      </g>
      <g stroke="#2f6f9e" stroke-width="5" fill="none" stroke-linecap="round">
        <path d="M30 52 V30 H52"/><path d="M226 52 V30 H204"/>
        <path d="M30 204 V226 H52"/><path d="M226 204 V226 H204"/>
      </g>
      <!-- луч слева через центр -->
      <rect x="22" y="124" width="98" height="8" fill="url(#beamCyan)" filter="url(#glow)"/>
      <!-- выход справа за кольцо (оранжевый — попадание соперника) -->
      <rect x="120" y="125" width="118" height="6" fill="url(#beamWarm)" filter="url(#glow)"/>
      <!-- центральная голубая вспышка -->
      <circle cx="120" cy="128" r="26" fill="url(#flash)"/>
      <circle cx="120" cy="128" r="8" fill="#fff" filter="url(#glow)"/>
      <!-- оранжевая вспышка попадания -->
      <circle cx="226" cy="128" r="22" fill="url(#flashWarm)"/>
      <circle cx="226" cy="128" r="7" fill="#fff" filter="url(#glow)"/>
    </symbol>

    <!-- 1C — фокус-скобки + выстрел -->
    <symbol id="c" viewBox="0 0 256 256">
      <rect width="256" height="256" rx="52" fill="#070b11"/>
      <rect x="5" y="5" width="246" height="246" rx="48" fill="none" stroke="#13283b" stroke-width="2"/>
      <g stroke="#4ab6ff" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
        <path d="M58 96 V58 H96"/><path d="M198 96 V58 H160"/>
        <path d="M58 160 V198 H96"/><path d="M198 160 V198 H160"/>
      </g>
      <!-- тики -->
      <g stroke="#2f6f9e" stroke-width="6" stroke-linecap="round">
        <path d="M128 30 V48"/><path d="M128 208 V226"/><path d="M30 128 H48"/><path d="M208 128 H226"/>
      </g>
      <!-- мощная вспышка-выстрел + блик -->
      <circle cx="128" cy="128" r="40" fill="url(#flash)"/>
      <g stroke="#dff3ff" stroke-width="4" stroke-linecap="round" filter="url(#glow)" opacity=".9">
        <path d="M128 98 V158"/><path d="M98 128 H158"/>
      </g>
      <circle cx="128" cy="128" r="12" fill="#fff" filter="url(#glow)"/>
    </symbol>

    <!-- 3A — планета + трассер навылет (доведённый) -->
    <symbol id="d" viewBox="0 0 256 256">
      <rect width="256" height="256" rx="52" fill="#070b11"/>
      <rect x="5" y="5" width="246" height="246" rx="48" fill="none" stroke="#13283b" stroke-width="2"/>
      <g transform="rotate(-22 128 128)">
        <path d="M44 128 A84 26 0 0 1 212 128" fill="none" stroke="#1d6aa8" stroke-width="7"/>
      </g>
      <circle cx="128" cy="128" r="54" fill="url(#sphere)" filter="url(#glow)"/>
      <ellipse cx="112" cy="108" rx="16" ry="10" fill="#fff" opacity=".5"/>
      <g transform="rotate(-22 128 128)">
        <path d="M212 128 A84 26 0 0 1 44 128" fill="none" stroke="#9fe0ff" stroke-width="8" filter="url(#glow)"/>
      </g>
      <rect x="128" y="124" width="118" height="7" fill="url(#beamCyan)" filter="url(#glow)"/>
      <circle cx="244" cy="128" r="18" fill="url(#flash)"/>
      <circle cx="240" cy="128" r="6.5" fill="#fff" filter="url(#glow)"/>
    </symbol>

    <!-- 3B — планета в прицеле (гибрид 1+3) -->
    <symbol id="e" viewBox="0 0 256 256">
      <rect width="256" height="256" rx="52" fill="#070b11"/>
      <rect x="5" y="5" width="246" height="246" rx="48" fill="none" stroke="#13283b" stroke-width="2"/>
      <!-- внешний прицел -->
      <g stroke="#3b86c4" fill="none">
        <circle cx="128" cy="128" r="92" stroke-width="4" stroke-dasharray="120 28" stroke-dashoffset="60"/>
      </g>
      <g stroke="#4ab6ff" stroke-width="6" stroke-linecap="round" filter="url(#glow)">
        <path d="M128 18 V40"/><path d="M128 216 V238"/><path d="M18 128 H40"/><path d="M216 128 H238"/>
      </g>
      <!-- планета -->
      <g transform="rotate(-22 128 128)">
        <path d="M58 128 A70 22 0 0 1 198 128" fill="none" stroke="#1d6aa8" stroke-width="6"/>
      </g>
      <circle cx="128" cy="128" r="44" fill="url(#sphere)" filter="url(#glow)"/>
      <ellipse cx="114" cy="110" rx="13" ry="8" fill="#fff" opacity=".5"/>
      <g transform="rotate(-22 128 128)">
        <path d="M198 128 A70 22 0 0 1 58 128" fill="none" stroke="#9fe0ff" stroke-width="7" filter="url(#glow)"/>
      </g>
    </symbol>

    <!-- 3C — крупная планета, толстый трассер (для читаемости в малом) -->
    <symbol id="f" viewBox="0 0 256 256">
      <rect width="256" height="256" rx="52" fill="#070b11"/>
      <rect x="5" y="5" width="246" height="246" rx="48" fill="none" stroke="#13283b" stroke-width="2"/>
      <rect x="14" y="122" width="120" height="12" fill="url(#beamCyan)" filter="url(#glow)"/>
      <g transform="rotate(-20 132 130)">
        <path d="M46 130 A86 30 0 0 1 218 130" fill="none" stroke="#1d6aa8" stroke-width="9"/>
      </g>
      <circle cx="132" cy="130" r="60" fill="url(#sphere)" filter="url(#glow)"/>
      <ellipse cx="114" cy="108" rx="18" ry="11" fill="#fff" opacity=".5"/>
      <g transform="rotate(-20 132 130)">
        <path d="M218 130 A86 30 0 0 1 46 130" fill="none" stroke="#9fe0ff" stroke-width="10" filter="url(#glow)"/>
      </g>
    </symbol>
  </defs></svg>

  <div class="grid" id="grid"></div>
  <script>
    const items = [
      ['a','1A','ПРИЦЕЛ + ПЕРЕКРЕСТИЕ','Снайперский прицел: кольцо с разрывами, тики, перекрестие к центру, яркая вспышка. Максимально читаемо.'],
      ['b','1B','ПРИЦЕЛ + ЛУЧ НАВЫЛЕТ','Луч входит слева (голубой), выходит справа оранжевой вспышкой попадания. Дуэльный акцент цветов игроков.'],
      ['c','1C','ФОКУС-СКОБКИ','Только угловые скобки видоискателя + мощная вспышка-выстрел с бликом. Очень чисто на мелком размере.'],
      ['d','3A','ПЛАНЕТА + ТРАССЕР','Крупная сфера с бликом, наклонное кольцо (перед ярче), луч навылет и вспышка на выходе.'],
      ['e','3B','ПЛАНЕТА В ПРИЦЕЛЕ','Гибрид: планета с кольцом внутри HUD-прицела со скобками. Узнаваемость объекта + рамка прицела.'],
      ['f','3C','ПЛАНЕТА КРУПНО','Сфера и кольцо крупнее, трассер толще — чтобы кольцо и луч читались даже в 16px.'],
    ];
    document.getElementById('grid').innerHTML = items.map(([id,num,name,desc]) => `
      <div class="card">
        <div class="card-head"><span class="num">${num}</span><span class="name">${name}</span></div>
        <div class="row">
          <svg class="ic hero"><use href="#${id}"/></svg>
          <div class="scales">
            <figure><svg class="ic" width="96" height="96"><use href="#${id}"/></svg><figcaption>96</figcaption></figure>
            <figure><svg class="ic" width="32" height="32"><use href="#${id}"/></svg><figcaption>32</figcaption></figure>
            <figure><svg class="ic" width="16" height="16"><use href="#${id}"/></svg><figcaption>16</figcaption></figure>
          </div>
        </div>
        <div class="desc">${desc}</div>
      </div>`).join('');
  </script>
</body>
</html>
