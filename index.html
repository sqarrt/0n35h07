<!doctype html>
<!-- lang=ru + translate=no: иначе Chrome предлагает «перевести страницу» поверх игры. -->
<html lang="ru" translate="no">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="google" content="notranslate" />
    <!-- user-scalable=no: без pinch/double-tap зума на гибридных экранах — UI игры не «плывёт». -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ONESHOT</title>
    <!-- Тёмный фон с первого кадра (до загрузки CSS-чанка) — иначе мелькает серое окно/страница. -->
    <style>html,body{margin:0;background:#06080c}</style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
