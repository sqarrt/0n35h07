<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <filter id="g" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="sph" cx="37%" cy="31%" r="76%">
      <stop offset="0%" stop-color="#e8f7ff"/>
      <stop offset="28%" stop-color="#73c9ff"/>
      <stop offset="70%" stop-color="#2a8fe0"/>
      <stop offset="100%" stop-color="#093c6f"/>
    </radialGradient>
    <radialGradient id="flash" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="36%" stop-color="#d8f1ff"/>
      <stop offset="100%" stop-color="#4ab6ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4ab6ff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#cdefff"/>
    </linearGradient>
  </defs>

  <!-- icon background -->
  <rect width="256" height="256" rx="54" fill="#070b11"/>
  <rect x="5" y="5" width="246" height="246" rx="50" fill="none" stroke="#13283b" stroke-width="2"/>

  <!-- tracer beam (enters from the left) -->
  <rect x="12" y="122.5" width="120" height="11" fill="url(#beam)" filter="url(#g)"/>

  <!-- planet back ring -->
  <g transform="rotate(-20 128 128)">
    <path d="M40 128 A88 29 0 0 1 216 128" fill="none" stroke="#1c66a4" stroke-width="9" stroke-linecap="round"/>
  </g>

  <!-- sphere -->
  <circle cx="128" cy="128" r="60" fill="url(#sph)" filter="url(#g)"/>
  <ellipse cx="108" cy="104" rx="19" ry="12" fill="#ffffff" opacity="0.45"/>

  <!-- hit flash on the sphere edge -->
  <circle cx="70" cy="128" r="15" fill="url(#flash)"/>
  <circle cx="71" cy="128" r="5" fill="#ffffff" filter="url(#g)"/>

  <!-- planet front ring (brighter) -->
  <g transform="rotate(-20 128 128)">
    <path d="M216 128 A88 29 0 0 1 40 128" fill="none" stroke="#a6e3ff" stroke-width="10" stroke-linecap="round" filter="url(#g)"/>
  </g>
</svg>
